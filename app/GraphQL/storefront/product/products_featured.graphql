query getFeaturedProducts(
  $tag: String!
  $limit: Int!
  $after: String
  $country: CountryCode
) @inContext(country: $country) {
  products(first: $limit, after: $after, query: $tag) {
    edges {
      cursor
      node {
        id
        title
        handle
        description
        descriptionHtml
        vendor
        productType
        tags
        availableForSale
        totalInventory
        publishedAt
        updatedAt
        onlineStoreUrl

        options {
          id
          name
          values
        }

        images(first: 250) {
          edges {
            node {
              id
              url
              altText
              width
              height
            }
          }
        }

        variants(first: 250) {
          edges {
            node {
              id
              title
              sku
              availableForSale
              quantityAvailable
              weight
              weightUnit

              selectedOptions {
                name
                value
              }

              price {
                amount
                currencyCode
              }

              compareAtPrice {
                amount
                currencyCode
              }

              image {
                url
                altText
                width
                height
              }
            }
          }
        }

        priceRange {
          minVariantPrice {
            amount
            currencyCode
          }
          maxVariantPrice {
            amount
            currencyCode
          }
        }

        compareAtPriceRange {
          minVariantPrice {
            amount
            currencyCode
          }
          maxVariantPrice {
            amount
            currencyCode
          }
        }

        collections(first: 10) {
          edges {
            node {
              id
              handle
              title
            }
          }
        }
      }
    }

    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
