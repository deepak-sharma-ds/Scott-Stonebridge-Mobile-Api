mutation associateCustomer(
  $cartId: ID!
  $buyerIdentity: CartBuyerIdentityInput!
  $country: CountryCode
) @inContext(country: $country) {
  cartBuyerIdentityUpdate(cartId: $cartId, buyerIdentity: $buyerIdentity) {
    cart {
      id
      checkoutUrl
      createdAt
      updatedAt

      lines(first: 250) {
        edges {
          node {
            id
            quantity

            merchandise {
              ... on ProductVariant {
                id
                title
                sku

                price {
                  amount
                  currencyCode
                }

                compareAtPrice {
                  amount
                  currencyCode
                }

                image {
                  url
                  altText
                }

                product {
                  id
                  title
                  handle
                }
              }
            }

            cost {
              totalAmount {
                amount
                currencyCode
              }
              subtotalAmount {
                amount
                currencyCode
              }
            }
          }
        }
      }

      cost {
        totalAmount {
          amount
          currencyCode
        }
        subtotalAmount {
          amount
          currencyCode
        }
        totalTaxAmount {
          amount
          currencyCode
        }
        totalDutyAmount {
          amount
          currencyCode
        }
      }

      buyerIdentity {
        email
        phone
        customer {
          id
          email
        }
      }
    }

    userErrors {
      field
      message
    }
  }
}
