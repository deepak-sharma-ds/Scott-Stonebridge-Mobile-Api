mutation cartLinesUpdate($cartId: ID!, $lines: [CartLineUpdateInput!]!) {
  cartLinesUpdate(cartId: $cartId, lines: $lines) {
    cart {
      id
      
      lines(first: 50) {
        edges {
          node {
            id
            quantity
            
            cost {
              totalAmount {
                amount
                currencyCode
              }
            }
          }
        }
      }
      
      cost {
        totalAmount {
          amount
          currencyCode
        }
        subtotalAmount {
          amount
          currencyCode
        }
      }
    }
    
    userErrors {
      field
      message
    }
  }
}
