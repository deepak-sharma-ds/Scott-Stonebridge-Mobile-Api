query getCart($cartId: ID!) {
  cart(id: $cartId) {
    id
    checkoutUrl
    createdAt
    updatedAt
    
    lines(first: 50) {
      edges {
        node {
          id
          quantity
          
          merchandise {
            ... on ProductVariant {
              id
              title
              sku
              
              price {
                amount
                currencyCode
              }
              
              product {
                id
                title
                handle
                
                featuredImage {
                  url
                  altText
                }
              }
            }
          }
          
          cost {
            totalAmount {
              amount
              currencyCode
            }
          }
          
          attributes {
            key
            value
          }
        }
      }
    }
    
    cost {
      totalAmount {
        amount
        currencyCode
      }
      subtotalAmount {
        amount
        currencyCode
      }
      totalTaxAmount {
        amount
        currencyCode
      }
      totalDutyAmount {
        amount
        currencyCode
      }
    }
    
    discountCodes {
      code
      applicable
    }
    
    buyerIdentity {
      email
      phone
      countryCode
    }
  }
}
