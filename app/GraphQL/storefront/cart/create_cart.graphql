mutation cartCreate($input: CartInput!) {
  cartCreate(input: $input) {
    cart {
      id
      checkoutUrl
      createdAt
      updatedAt
      
      lines(first: 50) {
        edges {
          node {
            id
            quantity
            
            merchandise {
              ... on ProductVariant {
                id
                title
                sku
                
                price {
                  amount
                  currencyCode
                }
                
                product {
                  id
                  title
                  handle
                }
              }
            }
            
            cost {
              totalAmount {
                amount
                currencyCode
              }
            }
            
            attributes {
              key
              value
            }
          }
        }
      }
      
      cost {
        totalAmount {
          amount
          currencyCode
        }
        subtotalAmount {
          amount
          currencyCode
        }
        totalTaxAmount {
          amount
          currencyCode
        }
        totalDutyAmount {
          amount
          currencyCode
        }
      }
      
      discountCodes {
        code
        applicable
      }
      
      buyerIdentity {
        email
        phone
        countryCode
      }
    }
    
    userErrors {
      field
      message
    }
  }
}
