query($accessToken: String!, $limit: Int!, $after: String) {
  customer(customerAccessToken: $accessToken) {
    orders(first: $limit, after: $after, sortKey: PROCESSED_AT, reverse: true) {
      edges {
        cursor
        node {
          id
          name
          orderNumber
          financialStatus
          fulfillmentStatus
          processedAt
          currencyCode
          
          totalPriceV2 {
            amount
            currencyCode
          }
          subtotalPriceV2 {
             amount
             currencyCode
          }
          totalTaxV2 {
            amount
            currencyCode
          }
          totalShippingPriceV2 {
            amount
            currencyCode
          }
          
          lineItems(first: 5) {
            edges {
              node {
                title
                quantity
                variant {
                  id
                  title
                  image {
                    url
                    altText
                  }
                  priceV2 {
                    amount
                    currencyCode
                  }
                }
              }
            }
          }
        }
      }
      pageInfo {
        hasNextPage
      }
    }
  }
}
