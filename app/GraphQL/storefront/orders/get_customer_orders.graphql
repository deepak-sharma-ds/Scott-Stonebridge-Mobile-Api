query getCustomerOrders(
  $accessToken: String!
  $limit: Int!
  $after: String
  $orderQuery: String
  $lineItemLimit: Int!
  $country: CountryCode
) @inContext(country: $country) {
  customer(customerAccessToken: $accessToken) {
    id

    orders(first: $limit, after: $after, query: $orderQuery) {
      edges {
        cursor
        node {
          id
          name
          orderNumber
          processedAt
          financialStatus
          fulfillmentStatus

          totalPrice {
            amount
            currencyCode
          }
          subtotalPrice {
            amount
            currencyCode
          }
          totalShippingPrice {
            amount
            currencyCode
          }
          totalTax {
            amount
            currencyCode
          }

          billingAddress {
            name
            address1
            address2
            city
            province
            country
            zip
            phone
          }

          shippingAddress {
            name
            address1
            address2
            city
            province
            country
            zip
            phone
          }

          lineItems(first: $lineItemLimit) {
            nodes {
              title
              quantity

              discountedTotalPrice {
                amount
                currencyCode
              }

              originalTotalPrice {
                amount
                currencyCode
              }

              customAttributes {
                key
                value
              }

              variant {
                id
                title
                sku

                image {
                  url
                  altText
                }

                product {
                  id
                  title
                  handle
                }
              }
            }
          }

          discountApplications(first: $lineItemLimit) {
            nodes {
              __typename

              ... on DiscountCodeApplication {
                code
                allocationMethod
                targetSelection
                targetType
                value {
                  __typename
                  ... on MoneyV2 {
                    amount
                    currencyCode
                  }
                  ... on PricingPercentageValue {
                    percentage
                  }
                }
              }

              ... on AutomaticDiscountApplication {
                title
                allocationMethod
                targetSelection
                targetType
                value {
                  __typename
                  ... on MoneyV2 {
                    amount
                    currencyCode
                  }
                  ... on PricingPercentageValue {
                    percentage
                  }
                }
              }

              ... on ManualDiscountApplication {
                title
                allocationMethod
                targetSelection
                targetType
                value {
                  __typename
                  ... on MoneyV2 {
                    amount
                    currencyCode
                  }
                  ... on PricingPercentageValue {
                    percentage
                  }
                }
              }

              ... on ScriptDiscountApplication {
                title
                allocationMethod
                targetSelection
                targetType
                value {
                  __typename
                  ... on MoneyV2 {
                    amount
                    currencyCode
                  }
                  ... on PricingPercentageValue {
                    percentage
                  }
                }
              }
            }
          }

          successfulFulfillments(first: $lineItemLimit) {
            trackingCompany
            trackingInfo {
              number
              url
            }
          }

          statusUrl
        }
      }

      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}
