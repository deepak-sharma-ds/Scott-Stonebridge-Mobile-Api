query getPage($handle: String!) {
  pageByHandle(handle: $handle) {
    id
    title
    handle
    body
    bodySummary
    createdAt
    updatedAt

    seo {
      title
      description
    }

    metafields(
      identifiers: [
        { namespace: "custom", key: "event_heading" }
        { namespace: "custom", key: "event_name" }
        { namespace: "custom", key: "event_location" }
        { namespace: "custom", key: "event_date" }
        { namespace: "custom", key: "event_bird_end" }
        { namespace: "custom", key: "event_charge" }
        { namespace: "custom", key: "event_left_image" }
        { namespace: "custom", key: "event_right_image" }
        { namespace: "custom", key: "event_address_above_content" }
        { namespace: "custom", key: "eventry_entry_time" }
        { namespace: "custom", key: "event_start_time" }
        { namespace: "custom", key: "event_end_time" }
        { namespace: "custom", key: "event_full_address" }
        { namespace: "custom", key: "event_admission_fees" }
        { namespace: "custom", key: "tickets_available" }
        { namespace: "custom", key: "event_form_text" }
        { namespace: "custom", key: "event_form" }
        { namespace: "custom", key: "profile_image" }
        { namespace: "custom", key: "event_text_heading" }
        { namespace: "custom", key: "event_text_description" }
        { namespace: "custom", key: "mid_banner_section" }
        { namespace: "custom", key: "hero_banner" }
        { namespace: "custom", key: "eventry_entry_time_img" }
        { namespace: "custom", key: "event_start_time_img" }
        { namespace: "custom", key: "event_end_time_img" }
        { namespace: "custom", key: "event_full_address_img" }
        { namespace: "custom", key: "event_admission_fees_img" }
        { namespace: "custom", key: "donation_info" }
      ]
    ) {
      key
      value
      namespace
      references(first: 10) {
        nodes {
          ... on Metaobject {
            id
            type
            fields {
              key
              value
            }
          }
        }
      }
    }
  }
}
