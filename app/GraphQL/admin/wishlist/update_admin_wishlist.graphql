mutation($customerId: ID!, $value: String!) {
  customerUpdate(input: {
    id: $customerId,
    metafields: [
      {
        namespace: "custom",
        key: "wishlist",
        value: $value,
        type: "json"
      }
    ]
  }) {
    customer {
      id
      metafields(first: 5) {
        edges {
          node {
            namespace
            key
            value
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
