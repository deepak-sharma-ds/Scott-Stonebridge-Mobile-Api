mutation customerAddressUpdate(
  $id: ID!,
  $address: MailingAddressInput!,
  $setAsDefault: Boolean
) {
  customerAddressUpdate(
    id: $id,
    address: $address,
    setAsDefault: $setAsDefault
  ) {
    address {
      id
      firstName
      lastName
      address1
      address2
      city
      province
      country
      zip
      phone
      name
      provinceCode
      countryCodeV2
    }
    userErrors {
      field
      message
    }
  }
}
