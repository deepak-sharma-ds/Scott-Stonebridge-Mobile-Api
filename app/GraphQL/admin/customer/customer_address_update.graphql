mutation customerAddressUpdate(
  $customerId: ID!
  $addressId: ID!
  $address: MailingAddressInput!
) {
  customerAddressUpdate(
    customerId: $customerId
    addressId: $addressId
    address: $address
  ) {
    address {
      id
      firstName
      lastName
      address1
      address2
      city
      province
      country
      zip
      phone
      name
      provinceCode
      countryCodeV2
    }
    userErrors {
      field
      message
    }
  }
}
