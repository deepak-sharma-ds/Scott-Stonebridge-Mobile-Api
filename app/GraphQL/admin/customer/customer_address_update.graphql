mutation customerAddressUpdate(
  $id: ID!,
  $address: MailingAddressInput!
) {
  customerAddressUpdate(
    id: $id,
    address: $address
  ) {
    address {
      id
      firstName
      lastName
      address1
      address2
      city
      province
      country
      zip
      phone
      name
      provinceCode
      countryCodeV2
    }
    userErrors {
      field
      message
    }
  }
}
